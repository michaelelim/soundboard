<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Soundboard</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    *{box-sizing:border-box;font-family:sans-serif;user-select:none;-webkit-user-select:none}
    body{margin:0;padding:20px;background:#111;color:#eee;min-height:100vh}
    h1{font-size:1.4rem;margin:0 0 12px;text-align:center}
    .drop{padding:28px;border:2px dashed #444;border-radius:12px;text-align:center;color:#888;margin-bottom:16px;transition:all .2s}
    .drop.dragover{border-color:#0a84ff;color:#0a84ff;background:rgba(10,132,255,.08)}
    #fileInput{display:none}
    .board{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:12px}
    .btn{padding:18px 10px;border-radius:10px;border:1px solid #333;background:#1e1e1e;color:#eee;font-size:.95rem;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;transition:transform .06s,background .15s}
    .btn:hover{background:#262626;transform:scale(1.03)}
    .btn.playing{background:#2a6cff;border-color:#2a6cff}
    .btn .name{font-size:.78rem;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
    .btn audio{display:none}
    .empty{grid-column:1/-1;text-align:center;padding:30px;color:#666}
    .controls{margin:16px auto;max-width:420px;display:flex;gap:8px;justify-content:center}
    .controls button{padding:8px 16px;border-radius:8px;border:1px solid #444;background:#222;color:#eee;cursor:pointer}
    .controls button:hover{background:#333}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#222;padding:10px 20px;border-radius:8px;color:#0a84ff;font-size:.85rem;box-shadow:0 4px 18px rgba(0,0,0,.4);display:none;z-index:9999}
    .badge{font-size:.6rem;background:#333;padding:2px 6px;border-radius:4px;color:#888;margin-left:6px}
  </style>
</head>
<body>
  <h1>Soundboard</h1>
  <div class="drop" id="drop">Drop MP3/WAV/OGG here &hellip; or click to choose files</div>
  <input type="file" id="fileInput" accept=".mp3,.wav,.ogg,.m4a,.flac" multiple>
  <div class="controls">
    <button id="clear">Clear</button>
    <span class="badge" id="count"></span>
  </div>
  <div class="board" id="board"><div class="empty">No sounds loaded</div></div>
  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
